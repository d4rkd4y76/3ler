<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 360" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="nkSteel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="35%" stop-color="#94a3b8"/>
      <stop offset="70%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="nkArmor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="45%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="nkGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="nkCape" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="nkBlade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="40%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <filter id="nkGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nkShadow" x="-50%" y="-20%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity=".45"/>
    </filter>
  </defs>

  <!-- Zemin gölgesi -->
  <ellipse class="nova-knight-svg__shadow" cx="120" cy="338" rx="72" ry="14" fill="#0f172a" opacity=".28"/>

  <!-- Pelerin -->
  <g class="nova-knight-svg__cape">
    <path d="M88 118 C62 150 54 210 68 280 C78 300 98 308 120 312 C142 308 162 300 172 280 C186 210 178 150 152 118 Z" fill="url(#nkCape)" opacity=".92"/>
    <path d="M98 130 C80 165 76 215 88 265" stroke="#a78bfa" stroke-width="2" opacity=".35" fill="none"/>
  </g>

  <!-- Bacaklar -->
  <g class="nova-knight-svg__legs" filter="url(#nkShadow)">
    <path d="M98 248 L92 320 L108 322 L114 252 Z" fill="url(#nkArmor)"/>
    <path d="M142 248 L148 320 L132 322 L126 252 Z" fill="url(#nkArmor)"/>
    <path d="M90 318 L150 318 L148 332 L92 332 Z" fill="#1e293b"/>
    <rect x="88" y="300" width="64" height="12" rx="4" fill="url(#nkGold)" opacity=".85"/>
  </g>

  <!-- Gövde -->
  <g class="nova-knight-svg__torso" filter="url(#nkShadow)">
    <path d="M88 138 C84 175 86 220 94 252 L146 252 C154 220 156 175 152 138 C148 118 128 108 120 106 C112 108 92 118 88 138 Z" fill="url(#nkArmor)"/>
    <path d="M108 145 L132 145 L128 210 L112 210 Z" fill="url(#nkGold)" opacity=".75"/>
    <ellipse cx="120" cy="132" rx="28" ry="8" fill="#475569" opacity=".5"/>
  </g>

  <!-- Kafa / mifer -->
  <g class="nova-knight-svg__head" filter="url(#nkGlow)">
    <path d="M96 72 C96 48 108 34 120 32 C132 34 144 48 144 72 L142 108 C140 118 130 124 120 124 C110 124 100 118 98 108 Z" fill="url(#nkArmor)"/>
    <path d="M102 78 L138 78 L136 96 C134 102 126 106 120 106 C114 106 106 102 104 96 Z" fill="#0f172a" opacity=".85"/>
    <rect x="108" y="86" width="24" height="6" rx="2" fill="#38bdf8" opacity=".65"/>
    <path d="M118 58 L120 28 L122 58" stroke="url(#nkGold)" stroke-width="4" stroke-linecap="round"/>
    <path d="M94 95 C88 100 86 108 90 114" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <path d="M146 95 C152 100 154 108 150 114" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Sol kol + kalkan -->
  <g class="nova-knight-svg__shield-arm">
    <path d="M72 148 L58 175 L62 220 L78 235 L88 200 Z" fill="url(#nkArmor)"/>
    <ellipse cx="62" cy="188" rx="22" ry="28" fill="url(#nkGold)" stroke="#78350f" stroke-width="3"/>
    <path d="M58 178 L66 188 L58 198" stroke="#fde68a" stroke-width="2" fill="none"/>
  </g>

  <!-- Sa kol + k1l1ç (vuru_ pivot: omuz) -->
  <g class="nova-knight-svg__arm" style="transform-origin: 158px 158px">
    <path d="M148 142 L178 128 L186 155 L168 178 L152 168 Z" fill="url(#nkArmor)"/>
    <g class="nova-knight-svg__sword">
      <rect x="176" y="108" width="10" height="18" rx="2" fill="url(#nkGold)"/>
      <rect x="172" y="124" width="18" height="6" rx="2" fill="url(#nkGold)"/>
      <path d="M181 130 L181 24 L189 24 L189 130 Z" fill="url(#nkBlade)"/>
      <path d="M181 28 L185 8 L189 28 Z" fill="#f8fafc"/>
      <path d="M183 40 L183 110" stroke="#fff" stroke-width="1.5" opacity=".55"/>
      <path class="nova-knight-svg__blade-glint" d="M186 50 L186 95" stroke="#fef08a" stroke-width="2" stroke-linecap="round" opacity="0"/>
    </g>
  </g>

  <!-- Darbe k1v1lc1m1 (FX s1ras1nda) -->
  <g class="nova-knight-svg__sparks" opacity="0">
    <circle cx="118" cy="300" r="4" fill="#fde68a"/>
    <circle cx="132" cy="296" r="3" fill="#fbbf24"/>
    <circle cx="105" cy="294" r="2.5" fill="#fff"/>
  </g>
</svg>
