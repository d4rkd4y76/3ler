<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Geometri Atölyesi</title>
  <link rel="stylesheet" href="../tool-sound.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body class="geo-app">
  <div class="geo-app-flow">
    <header class="topbar">
      <div class="topbar-row topbar-row--with-sound">
        <button type="button" class="btn-back" id="backToDuellomatik" aria-label="Düellomatik ana sayfaya dön">← Ana sayfa</button>
        <button type="button" class="chip-btn--sound" id="toggle-sound" aria-pressed="false" title="Seslendir">🔊</button>
      </div>
      <div class="title-wrap">
        <h1>Geometri Atölyesi</h1>
        <p id="shapeDesc">Şekilleri çevir; kağıt halini ve bilgileri keşfet.</p>
      </div>
    </header>

    <main class="app-main">
      <div class="app-main-head">
        <h2 id="shapeTitle">Küp</h2>
      </div>

      <div id="geo-controls-rail" class="geo-controls-rail">
        <button type="button" class="geo-controls-toggle" id="geo-controls-toggle" aria-expanded="false" aria-controls="geo-controls-drawer">
          <span class="geo-controls-toggle-text">Şekil ve ayarlar</span>
          <span class="geo-controls-toggle-chev" aria-hidden="true">▼</span>
        </button>
        <div id="geo-controls-drawer" class="geo-controls-drawer" aria-hidden="true">
          <div class="geo-controls-drawer-inner">
            <div id="shapeButtons" class="shape-scroll"></div>
            <section class="sticky-controls" id="sticky-controls" data-active-tab="3d">
              <div class="action-row" id="action-row">
                <button id="toggleOpenBtn" class="btn primary tab-only-net" type="button">Kağıttaki gibi göster</button>
                <button id="toggleRotateBtn" class="btn tab-only-not-info" type="button">Kendi kendine dönsün</button>
                <button id="toggleExplodeBtn" class="btn tab-only-3d" type="button">Yüzleri ayır</button>
                <button id="resetBtn" class="btn danger" type="button">Başına al</button>
              </div>
              <div class="toggle-row" id="geometry-toggles">
                <label class="geo-toggle">
                  <input id="showFaces" class="geo-toggle-input" type="checkbox" checked>
                  <span class="geo-toggle-mark" aria-hidden="true"></span>
                  <span class="geo-toggle-label">Yüzey</span>
                </label>
                <label class="geo-toggle">
                  <input id="showEdges" class="geo-toggle-input" type="checkbox" checked>
                  <span class="geo-toggle-mark" aria-hidden="true"></span>
                  <span class="geo-toggle-label">Ayrıt</span>
                </label>
                <label class="geo-toggle">
                  <input id="showVertices" class="geo-toggle-input" type="checkbox" checked>
                  <span class="geo-toggle-mark" aria-hidden="true"></span>
                  <span class="geo-toggle-label">Köşe</span>
                </label>
              </div>
            </section>
          </div>
        </div>
      </div>

      <div class="view-panels">
        <section id="panel-view-3d" class="view-panel active">
          <h3 class="view-panel-tag">3B</h3>
          <canvas id="mainCanvas"></canvas>
        </section>

        <section id="panel-view-net" class="view-panel">
          <h3 class="view-panel-tag">Kağıt</h3>
          <canvas id="netCanvas"></canvas>
        </section>

        <section id="panel-view-info" class="view-panel">
          <h3 class="view-panel-tag">Bilgi</h3>
          <ul id="shapeProps"></ul>
          <p id="shapeNote" class="note"></p>
          <div class="learn-box">
            <h4>Sana anlatım</h4>
            <p id="shapeKidInfo"></p>
          </div>
          <div class="learn-box">
            <h4>Hayattan örnekler</h4>
            <ul id="shapeExamples"></ul>
          </div>
          <div class="learn-box">
            <h4>Mini soru</h4>
            <p id="shapeQuestion"></p>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div class="geo-bottom-dock" role="navigation" aria-label="Görünüm">
    <nav class="bottom-tabs" aria-label="Görünüm seç">
      <button class="tab-btn active" type="button" data-tab="3d" title="Üç boyutlu model">
        <span class="tab-ico" aria-hidden="true">🧊</span>
        <span class="tab-lbl">3B</span>
      </button>
      <button class="tab-btn" type="button" data-tab="net" title="Kağıt üstündeki açılım">
        <span class="tab-ico" aria-hidden="true">📄</span>
        <span class="tab-lbl">Kağıt</span>
      </button>
      <button class="tab-btn" type="button" data-tab="info" title="Bilgi ve soru">
        <span class="tab-ico" aria-hidden="true">💡</span>
        <span class="tab-lbl">Bilgi</span>
      </button>
    </nav>
  </div>

  <footer class="signature">NASK GAMES</footer>
  <script src="../tool-sound.js"></script>
  <script src="app.js"></script>
</body>
</html>
