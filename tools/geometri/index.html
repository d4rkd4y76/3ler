<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Geometri Atölyesi - İlkokul 3. Sınıf</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="title-wrap">
      <h1>Geometri Atölyesi</h1>
      <p id="shapeDesc">Geometrik cisimleri döndür, açılımını izle.</p>
    </div>
  </header>

  <section class="sticky-controls">
    <div id="shapeButtons" class="shape-scroll"></div>
    <div class="action-row">
      <button id="toggleOpenBtn" class="btn primary">Açılımı Aç</button>
      <button id="toggleRotateBtn" class="btn" data-only-3d="1">Döndür</button>
      <button id="toggleExplodeBtn" class="btn" data-only-3d="1">Parçala</button>
      <button id="resetBtn" class="btn danger">Sıfırla</button>
    </div>
    <div class="toggle-row">
      <label><input id="showFaces" type="checkbox" checked> Yüzey</label>
      <label><input id="showEdges" type="checkbox" checked> Ayrıt</label>
      <label><input id="showVertices" type="checkbox" checked> Köşe</label>
      <label><input id="strictMode" type="checkbox" checked> Öğretmen Modu</label>
    </div>
  </section>

  <main class="app-main">
    <h2 id="shapeTitle">Küp</h2>
    <section id="panel-view-3d" class="view-panel active">
      <h3>3B Görünüm</h3>
      <canvas id="mainCanvas"></canvas>
    </section>

    <section id="panel-view-net" class="view-panel">
      <h3>Açılım Animasyonu</h3>
      <canvas id="netCanvas"></canvas>
    </section>

    <section id="panel-view-info" class="view-panel">
      <h3>Öğren</h3>
      <ul id="shapeProps"></ul>
      <p id="shapeNote" class="note"></p>
      <div class="learn-box">
        <h4>3. Sınıf Anlatım</h4>
        <p id="shapeKidInfo"></p>
      </div>
      <div class="learn-box">
        <h4>Günlük Hayat Örnekleri</h4>
        <ul id="shapeExamples"></ul>
      </div>
      <div class="learn-box">
        <h4>Mini Soru</h4>
        <p id="shapeQuestion"></p>
      </div>
    </section>
  </main>

  <nav class="bottom-tabs">
    <button class="tab-btn active" data-tab="3d">3B</button>
    <button class="tab-btn" data-tab="net">Açılım</button>
    <button class="tab-btn" data-tab="info">Bilgi</button>
  </nav>

  <footer class="signature">NASK GAMES</footer>
  <script src="app.js"></script>
</body>
</html>
